<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeBite | Messages & Queries</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,500;0,700;0,800;1,600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* === VARIABLES & RESET === */
        :root {
            --primary-color: #e28743; 
            --secondary-color: #f4c150;
            --dark-bg: #050505; 
            --section-bg: #0a0a0a; 
            --sidebar-bg: #020202;
            --card-bg: #151515;
            --text-light: #ffffff;
            --text-muted: #a0a0a0;
            --danger: #ff4757;
            --success: #2ed573;
            --info: #00d2d3;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        h1, h2, h3, h4, .brand-logo { font-family: 'Playfair Display', serif; }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        /* === MOBILE OVERLAY === */
        .mobile-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 998;
            backdrop-filter: blur(3px);
        }

        /* === SIDEBAR (NAVIGATION) === */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            z-index: 999;
        }
        
        .sidebar-header {
            padding: 25px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .brand-logo { font-size: 1.8rem; font-weight: 800; color: var(--text-light); letter-spacing: 1px; }
        .brand-logo span { color: var(--primary-color); font-style: italic; }
        .partner-tag { font-size: 0.75rem; color: var(--primary-color); text-transform: uppercase; letter-spacing: 2px; display: block; margin-top: -5px; }
        
        .close-sidebar { display: none; font-size: 1.5rem; color: var(--text-muted); cursor: pointer; }

        .nav-menu { flex: 1; padding: 20px 0; overflow-y: auto; display: flex; flex-direction: column; }
        
        .nav-item {
            padding: 15px 25px; display: flex; align-items: center; gap: 15px;
            color: var(--text-muted); cursor: pointer; transition: var(--transition);
            font-size: 0.95rem; border-left: 3px solid transparent;
            text-decoration: none; width: 100%;
        }
        .nav-item:hover, .nav-item.active {
            color: var(--primary-color); background: rgba(226, 135, 67, 0.05); border-left-color: var(--primary-color);
        }
        .nav-item i { font-size: 1.2rem; width: 25px; text-align: center; }

        /* === MAIN CONTENT === */
        .main-content {
            flex: 1; display: flex; flex-direction: column; 
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--section-bg) 100%);
            overflow-y: auto; 
            overflow-x: hidden;
        }

        /* === TOP HEADER === */
        .top-header {
            background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(10px);
            padding: 20px 30px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 20px; }
        .menu-toggle { display: none; font-size: 1.5rem; color: var(--text-light); cursor: pointer; }
        
        .header-left h2 { font-size: 1.5rem; font-family: 'Poppins', sans-serif; font-weight: 600; }
        .header-left p { font-size: 0.85rem; color: var(--text-muted); }

        .header-right { display: flex; align-items: center; gap: 25px; }
        
        .status-toggle { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; font-weight: 500; }
        .switch { position: relative; display: inline-block; width: 46px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(22px); }
        
        .notification { position: relative; cursor: pointer; color: var(--text-muted); transition: 0.3s; font-size: 1.2rem; }
        .notification:hover { color: var(--text-light); }
        .badge { position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; font-size: 0.6rem; font-weight: bold; width: 15px; height: 15px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        
        .profile { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .profile img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary-color); }
        .profile-name { font-size: 0.9rem; font-weight: 500; }

        /* === MESSAGES CONTAINER === */
        .messages-container { padding: 30px; display: flex; flex-direction: column; gap: 25px; max-width: 1200px; margin: 0 auto; width: 100%; }
        
        /* Action Bar */
        .action-bar { display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap; background: var(--card-bg); padding: 15px 25px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        
        .filter-tabs { display: flex; gap: 10px; }
        .filter-btn { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); padding: 8px 18px; border-radius: 20px; font-size: 0.9rem; cursor: pointer; transition: 0.3s; font-family: 'Poppins', sans-serif; }
        .filter-btn.active, .filter-btn:hover { background: rgba(226, 135, 67, 0.1); color: var(--primary-color); border-color: var(--primary-color); }
        
        .search-box { position: relative; flex: 1; max-width: 350px; }
        .search-box input { width: 100%; padding: 10px 15px 10px 40px; background: var(--sidebar-bg); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; color: #fff; font-family: 'Poppins', sans-serif; font-size: 0.9rem; transition: 0.3s; }
        .search-box input:focus { border-color: var(--primary-color); outline: none; }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        /* Message List */
        .message-list { display: flex; flex-direction: column; gap: 15px; }

        .message-card { 
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 12px; 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            transition: var(--transition);
            position: relative;
        }
        .message-card:hover { border-color: rgba(226, 135, 67, 0.3); transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        
        /* Unread Indicator */
        .message-card.unread { border-left: 4px solid var(--primary-color); background: rgba(226, 135, 67, 0.02); }
        
        .msg-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 10px; }
        
        .sender-info { display: flex; align-items: center; gap: 15px; }
        .sender-avatar { width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: var(--text-muted); font-weight: 600; }
        .message-card.unread .sender-avatar { background: rgba(226, 135, 67, 0.1); color: var(--primary-color); }
        
        .sender-details h4 { font-family: 'Poppins', sans-serif; font-size: 1.1rem; font-weight: 600; margin: 0; color: #fff; }
        .sender-details p { margin: 0; font-size: 0.85rem; color: var(--primary-color); }

        .msg-meta { text-align: right; }
        .msg-date { font-size: 0.85rem; color: var(--text-muted); display: block; margin-bottom: 5px; }
        .status-badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .status-badge.new { background: rgba(226, 135, 67, 0.1); color: var(--primary-color); border: 1px solid rgba(226, 135, 67, 0.3); }
        .status-badge.resolved { background: rgba(46, 213, 115, 0.1); color: var(--success); border: 1px solid rgba(46, 213, 115, 0.3); }

        .msg-body { background: var(--sidebar-bg); padding: 15px 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.02); }
        .msg-subject { font-weight: 600; font-size: 1rem; color: #fff; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .msg-text { font-size: 0.95rem; color: var(--text-muted); line-height: 1.6; }

        .msg-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 5px; }
        
        .btn-action { padding: 8px 18px; border-radius: 6px; font-size: 0.85rem; cursor: pointer; transition: 0.3s; font-weight: 500; font-family: 'Poppins', sans-serif; display: flex; align-items: center; gap: 8px; border: none; }
        
        .btn-reply { background: rgba(0, 210, 211, 0.1); color: var(--info); border: 1px solid rgba(0, 210, 211, 0.2); }
        .btn-reply:hover { background: var(--info); color: #fff; }
        
        .btn-resolve { background: rgba(46, 213, 115, 0.1); color: var(--success); border: 1px solid rgba(46, 213, 115, 0.2); }
        .btn-resolve:hover { background: var(--success); color: #fff; }
        
        .btn-delete { background: transparent; color: var(--text-muted); }
        .btn-delete:hover { color: var(--danger); }

        /* === MEDIA QUERIES === */
        @media (max-width: 991px) {
            .sidebar { position: fixed; left: -260px; top: 0; height: 100vh; }
            .sidebar.show { left: 0; }
            .mobile-overlay.show { display: block; }
            .menu-toggle { display: block; }
            .close-sidebar { display: block; }
            
            .top-header { padding: 15px 20px; }
            .messages-container { padding: 20px; }
            
            #restStatusText { display: none; }
        }

        @media (max-width: 768px) {
            .header-left h2 { font-size: 1.2rem; }
            .header-left p, .profile-name { display: none; }
            
            .action-bar { flex-direction: column; align-items: stretch; }
            .search-box { max-width: 100%; }
            .filter-tabs { overflow-x: auto; padding-bottom: 5px; }
            
            .msg-header { flex-direction: column; }
            .msg-meta { text-align: left; margin-top: 10px; }
            .msg-actions { flex-wrap: wrap; justify-content: flex-start; }
            .btn-action { flex: 1; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="mobile-overlay" id="mobileOverlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div>
                <a href="#" class="brand-logo">Home<span>Bite</span>.</a>
                <span class="partner-tag">Restaurant Portal</span>
            </div>
            <i class="fas fa-times close-sidebar" onclick="toggleSidebar()"></i>
        </div>
        
        <ul class="nav-menu">
            <li><a href="restaurant-dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i> Dashboard</a></li>
            <li><a href="live-orders.html" class="nav-item"><i class="fas fa-bell"></i> Live Orders</a></li>
            <li><a href="menu.html" class="nav-item"><i class="fas fa-utensils"></i> Menu Management</a></li>
            <li><a href="messages.html" class="nav-item active"><i class="fas fa-envelope"></i> Messages <span style="background: var(--primary-color); color: #fff; font-size: 0.7rem; padding: 2px 6px; border-radius: 10px; margin-left: auto;" id="newMsgCount">0</span></a></li>
            <li><a href="history.html" class="nav-item"><i class="fas fa-history"></i> Order History</a></li>
            <li><a href="finances.html" class="nav-item"><i class="fas fa-wallet"></i> Finances</a></li>
            <li><a href="settings.html" class="nav-item"><i class="fas fa-cog"></i> Settings</a></li>
            <li style="margin-top: auto;"><a href="logout.html" class="nav-item" style="color: var(--danger);"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </aside>

    <main class="main-content">
        
        <header class="top-header">
            <div class="header-left">
                <i class="fas fa-bars menu-toggle" onclick="toggleSidebar()"></i>
                <div>
                    <h2>Customer Inbox ✉️</h2>
                    <p>Read and respond to customer queries & feedback.</p>
                </div>
            </div>
            <div class="header-right">
                <div class="status-toggle">
                    <span id="restStatusText">Accepting Orders</span>
                    <label class="switch">
                        <input type="checkbox" id="restStatusToggle" checked onchange="toggleRestaurantStatus()">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="notification">
                    <i class="fas fa-bell"></i>
                    <span class="badge" id="notifBadge">0</span>
                </div>
                <div class="profile">
                    <img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=150&q=80" alt="Logo">
                    <span class="profile-name">Spice & Grill</span>
                </div>
            </div>
        </header>

        <section class="messages-container">
            
            <div class="action-bar">
                <div class="filter-tabs">
                    <button class="filter-btn active">All Messages</button>
                    <button class="filter-btn">Unread</button>
                    <button class="filter-btn">Resolved</button>
                </div>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search by name, email or keyword...">
                </div>
            </div>

            <div class="message-list" id="dynamicMessageList">
                <div style="text-align:center; padding: 40px; color: var(--text-muted);">
                    <i class="fas fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 10px;"></i>
                    <p>Loading messages...</p>
                </div>
            </div>

        </section>
    </main>

    <script>
        // === UI INTERACTION LOGIC ===
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobileOverlay');
            
            sidebar.classList.toggle('show');
            overlay.classList.toggle('show');
        }

        // === RESTAURANT STATUS TOGGLE ===
        function toggleRestaurantStatus() {
            const toggle = document.getElementById('restStatusToggle');
            const statusText = document.getElementById('restStatusText');
            
            if(toggle.checked) {
                statusText.innerText = "Accepting Orders";
                statusText.style.color = "var(--text-light)";
            } else {
                statusText.innerText = "Restaurant Closed";
                statusText.style.color = "var(--danger)";
            }
        }

        // === FETCH LIVE MESSAGES FROM RENDER BACKEND ===
        async function fetchMessages() {
            const messageList = document.getElementById('dynamicMessageList');
            
            try {
                // Aapka live Render API Endpoint jahan se data nikalna hai
                const apiURL = 'https://homebite-admin.onrender.com/api/contacts';
                
                const response = await fetch(apiURL);
                
                if(!response.ok) {
                    throw new Error(`HTTP Error! Status: ${response.status}`);
                }
                
                const messages = await response.json();
                
                // Loader clear karein
                messageList.innerHTML = '';
                
                if(!messages || messages.length === 0) {
                    messageList.innerHTML = `<div style="text-align:center; padding: 40px; color: var(--text-muted);">Database me koi message nahi mila.</div>`;
                    return;
                }

                let totalCount = messages.length;

                // Loop chala kar ek-ek document ka data template me fill karenge
                messages.forEach(msg => {
                    // Date Format processing (Ex: "Jul 7, 2026, 11:55 AM")
                    const dateObj = msg.createdAt ? new Date(msg.createdAt) : new Date();
                    const formattedDate = dateObj.toLocaleString('en-US', { 
                        month: 'short', 
                        day: 'numeric', 
                        year: 'numeric', 
                        hour: '2-digit', 
                        minute: '2-digit' 
                    });
                    
                    // Name ka pehla akshar avatar text ke liye (Ex: "rupesh" -> "R")
                    const initial = msg.name ? msg.name.charAt(0).toUpperCase() : 'U';

                    // Pura raw data card mapping: msg.name, msg.email, msg.subject, msg.message, msg._id
                    const cardHTML = `
                        <div class="message-card unread">
                            <div class="msg-header">
                                <div class="sender-info">
                                    <div class="sender-avatar">${initial}</div>
                                    <div class="sender-details">
                                        <h4>${msg.name || 'Anonymous'}</h4>
                                        <p>${msg.email || 'No Email'}</p>
                                    </div>
                                </div>
                                <div class="msg-meta">
                                    <span class="msg-date">${formattedDate}</span>
                                    <span class="status-badge new">New Message</span>
                                </div>
                            </div>
                            
                            <div class="msg-body">
                                <div class="msg-subject">Subject: ${msg.subject || 'No Subject'}</div>
                                <div class="msg-text">
                                    "${msg.message || 'Empty message content.'}"
                                </div>
                            </div>
                            
                            <div class="msg-actions">
                                <a href="mailto:${msg.email}" style="text-decoration:none;">
                                    <button class="btn-action btn-reply"><i class="fas fa-reply"></i> Reply via Email</button>
                                </a>
                                <button class="btn-action btn-resolve" onclick="markAsResolved('${msg._id}')">
                                    <i class="fas fa-check"></i> Mark as Resolved
                                </button>
                            </div>
                        </div>
                    `;
                    messageList.insertAdjacentHTML('beforeend', cardHTML);
                });

                // Badges ko total count se live update karein
                document.getElementById('notifBadge').innerText = totalCount;
                document.getElementById('newMsgCount').innerText = `${totalCount} New`;

            } catch (error) {
                console.error("Fetch API error detail:", error);
                messageList.innerHTML = `
                    <div style="text-align:center; padding: 40px; color: var(--danger);">
                        <i class="fas fa-exclamation-triangle" style="font-size: 2rem; margin-bottom: 10px;"></i>
                        <p>Error loading messages. Please check your connection or backend CORS setup.</p>
                    </div>
                `;
            }
        }

        // Action Trigger Functions
        function markAsResolved(id) {
            alert(`Message ID: ${id} ko resolve karne ka functionality future update me backend se connect karein.`);
        }

        // Page load hote hi data load ho jaye automatically
        document.addEventListener('DOMContentLoaded', fetchMessages);
    </script>
</body>
</html>
